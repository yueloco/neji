<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff5d6"/>
      <stop offset="55%"  stop-color="#f3dba0"/>
      <stop offset="100%" stop-color="#d8b366"/>
    </linearGradient>
    <radialGradient id="head" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#7a6f5e"/>
      <stop offset="60%"  stop-color="#3a3026"/>
      <stop offset="100%" stop-color="#15100a"/>
    </radialGradient>
  </defs>
  <!-- 背景（マスク対応のため全面塗り） -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 赤 + ネジ -->
  <g transform="translate(170, 220)">
    <circle r="64" fill="none" stroke="#dc2626" stroke-width="18"/>
    <circle r="46" fill="url(#head)" stroke="#0a0907" stroke-width="3"/>
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#f5e6c0" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="-24" x2="0" y2="24" stroke="#f5e6c0" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- 青 ● ネジ -->
  <g transform="translate(342, 220)">
    <circle r="64" fill="none" stroke="#2563eb" stroke-width="18"/>
    <circle r="46" fill="url(#head)" stroke="#0a0907" stroke-width="3"/>
    <circle r="20" fill="#f5e6c0"/>
  </g>

  <!-- 緑 ■ ネジ -->
  <g transform="translate(256, 376)">
    <circle r="64" fill="none" stroke="#16a34a" stroke-width="18"/>
    <circle r="46" fill="url(#head)" stroke="#0a0907" stroke-width="3"/>
    <rect x="-19" y="-19" width="38" height="38" fill="#f5e6c0" rx="3"/>
  </g>
</svg>
